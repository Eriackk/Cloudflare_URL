<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinShot · Data Machine Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a07;
    --panel:rgba(12,18,12,0.72);
    --green:#8fd14f;
    --green-bright:#b6ff5a;
    --green-dim:rgba(143,209,79,0.42);
    --amber:#ffb43e;
    --red:#ff5252;
    --text:rgba(198,224,170,0.9);
    --border:rgba(143,209,79,0.22);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:20px;
  }
  /* 矩阵雨背景 */
  #matrix{position:fixed;inset:0;z-index:0;opacity:0.13;}
  /* 暗角 + 扫描线氛围 */
  body::after{
    content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
  }

  .card{
    position:relative;z-index:2;
    width:100%;max-width:540px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:4px;
    padding:30px 28px 26px;
    backdrop-filter:blur(7px);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4), 0 24px 60px rgba(0,0,0,0.55), inset 0 0 60px rgba(143,209,79,0.03);
    animation:cardIn 0.7s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

  /* 顶部标题行 */
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .brand{
    font-family:'Major Mono Display',monospace;
    font-size:20px;letter-spacing:0.06em;color:var(--green-bright);
    text-shadow:0 0 14px rgba(182,255,90,0.35);
  }
  .corner{font-size:9px;color:var(--green-dim);letter-spacing:0.18em;}
  .subtitle{font-size:10px;letter-spacing:0.26em;color:var(--green-dim);text-transform:uppercase;margin-bottom:22px;}

  /* 状态灯 */
  .statusrow{display:flex;align-items:center;gap:9px;margin-bottom:18px;font-size:11px;letter-spacing:0.12em;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--green-dim);flex-shrink:0;}
  .dot.live{background:var(--green-bright);box-shadow:0 0 10px var(--green-bright);animation:pulse 1.6s ease-in-out infinite;}
  .dot.dead{background:var(--red);box-shadow:0 0 10px var(--red);}
  .dot.checking{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  #statusText{color:var(--text);}

  /* URL 显示框 */
  .label{font-size:9px;letter-spacing:0.24em;color:var(--green-dim);text-transform:uppercase;margin-bottom:8px;}
  .urlbox{
    position:relative;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--border);
    border-radius:3px;
    padding:15px 16px;
    margin-bottom:14px;
    min-height:54px;
    display:flex;align-items:center;
    word-break:break-all;
    transition:border-color 0.3s;
  }
  .urlbox:hover{border-color:var(--green-dim);}
  #urlText{
    font-size:15px;color:var(--green-bright);line-height:1.5;
    text-shadow:0 0 10px rgba(182,255,90,0.25);
    user-select:all;
  }
  #urlText.placeholder{color:var(--green-dim);font-size:13px;text-shadow:none;}

  .actions{display:flex;gap:10px;margin-bottom:20px;}
  .btn{
    flex:1;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;
    text-transform:uppercase;cursor:pointer;
    background:transparent;color:var(--green);
    border:1px solid var(--border);border-radius:3px;
    padding:11px 10px;transition:all 0.18s;text-decoration:none;text-align:center;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn:hover{background:rgba(143,209,79,0.1);border-color:var(--green);color:var(--green-bright);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{color:var(--green-dim);}
  .btn.copied{background:rgba(143,209,79,0.18);color:var(--green-bright);border-color:var(--green);}

  /* 底部元信息 */
  .meta{
    border-top:1px solid var(--border);padding-top:14px;
    display:flex;justify-content:space-between;font-size:10px;color:var(--green-dim);letter-spacing:0.06em;
  }
  .meta b{color:var(--text);font-weight:500;}
  .footer{margin-top:14px;text-align:center;font-size:9px;color:var(--green-dim);letter-spacing:0.14em;}
  .blink{animation:blink 1.2s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div class="card">
  <div class="head">
    <div class="brand">coinshot</div>
    <div class="corner">DATA LINK</div>
  </div>
  <div class="subtitle">data machine · live endpoint</div>

  <div class="statusrow">
    <span class="dot checking" id="dot"></span>
    <span id="statusText">checking link…</span>
  </div>

  <div class="label">current tunnel url</div>
  <div class="urlbox">
    <span id="urlText" class="placeholder">loading…</span>
  </div>

  <div class="actions">
    <button class="btn" id="copyBtn" onclick="copyUrl()">⧉ copy url</button>
    <a class="btn ghost" id="openBtn" href="#" target="_blank" rel="noopener">↗ open</a>
  </div>

  <div class="meta">
    <span>published <b id="updatedAt">—</b></span>
    <span>checked <b id="checkedAt">—</b></span>
  </div>

  <div class="footer">auto-refresh every 30s · <span class="blink">_</span></div>
</div>

<script>
/* ════════════════════════════════════════════════
   配置：把下面的 GH_USER / GH_REPO 改成你的仓库
   url.json 由数据机自动写入这个仓库根目录
   ════════════════════════════════════════════════ */
const GH_USER = "Eriackk";
const GH_REPO = "coinshot-tunnel";
const GH_BRANCH = "main";
// 从 raw.githubusercontent 读 url.json（带 CORS，可浏览器直读）
const URL_JSON = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/url.json`;

let currentUrl = "";

const $ = id => document.getElementById(id);

function fmtAgo(iso){
  if(!iso) return "—";
  const t = new Date(iso).getTime();
  if(isNaN(t)) return "—";
  const s = Math.floor((Date.now()-t)/1000);
  if(s<60) return s+"s ago";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

// 1) 读取 url.json，拿到当前数据机 URL
async function fetchUrl(){
  try{
    const r = await fetch(URL_JSON + "?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j = await r.json();
    currentUrl = (j.url||"").replace(/\/$/,"");
    if(currentUrl){
      $("urlText").textContent = currentUrl;
      $("urlText").classList.remove("placeholder");
      $("openBtn").href = currentUrl;
    }else{
      $("urlText").textContent = "no url published yet";
      $("urlText").classList.add("placeholder");
    }
    $("updatedAt").textContent = fmtAgo(j.updated_at);
    // 拿到 URL 后立即探活
    if(currentUrl) checkAlive();
  }catch(e){
    $("urlText").textContent = "cannot read url.json — check repo / file";
    $("urlText").classList.add("placeholder");
    setStatus("dead", "config error");
  }
}

// 2) 探活：用和数据机探针一致的方式 fetch /status 验证真能取到数据
async function checkAlive(){
  if(!currentUrl){ setStatus("dead","no url"); return; }
  setStatus("checking","checking link…");
  try{
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 8000);
    const r = await fetch(currentUrl + "/status", {signal:ctrl.signal, cache:"no-store"});
    clearTimeout(to);
    if(r.ok){
      const j = await r.json();
      if(j && typeof j==="object" && ("ws_connected" in j)){
        const ws = j.ws_connected ? "WS on" : "WS off";
        const total = (j.total||0).toLocaleString();
        setStatus("live", `online · ${ws} · ${total} rec`);
      }else{
        setStatus("dead","reachable but bad response");
      }
    }else{
      setStatus("dead","unreachable ("+r.status+")");
    }
  }catch(e){
    setStatus("dead","offline / tunnel down");
  }
  $("checkedAt").textContent = "just now";
}

function setStatus(state, text){
  const dot = $("dot");
  dot.className = "dot " + state;
  $("statusText").textContent = text;
}

function copyUrl(){
  if(!currentUrl) return;
  navigator.clipboard.writeText(currentUrl).then(()=>{
    const b=$("copyBtn"); b.classList.add("copied"); b.textContent="✓ copied";
    setTimeout(()=>{ b.classList.remove("copied"); b.textContent="⧉ copy url"; }, 1500);
  }).catch(()=>{
    // 退化方案：选中文本供手动复制
    const range=document.createRange(); range.selectNode($("urlText"));
    const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  });
}

// 初次加载 + 每 30s 刷新
fetchUrl();
setInterval(fetchUrl, 30000);
// 探活比 URL 刷新更频繁一点（每 15s）
setInterval(checkAlive, 15000);

/* ── 矩阵雨背景 ── */
(function(){
  const c=document.getElementById("matrix"), x=c.getContext("2d");
  let cols, drops, fs=14;
  const chars="01ｱｲｳｴｵｶｷｸｹｺ$￥BTCETHSOLXRP".split("");
  function resize(){
    c.width=innerWidth; c.height=innerHeight;
    cols=Math.floor(c.width/fs);
    drops=Array(cols).fill(0).map(()=>Math.random()*-50);
  }
  resize(); addEventListener("resize", resize);
  function draw(){
    x.fillStyle="rgba(7,10,7,0.08)"; x.fillRect(0,0,c.width,c.height);
    x.fillStyle="#8fd14f"; x.font=fs+"px monospace";
    for(let i=0;i<cols;i++){
      const ch=chars[Math.floor(Math.random()*chars.length)];
      x.fillText(ch, i*fs, drops[i]*fs);
      if(drops[i]*fs>c.height && Math.random()>0.975) drops[i]=0;
      drops[i]++;
    }
  }
  setInterval(draw, 60);
})();
</script>
</body>
</html>
