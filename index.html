<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinShot · Data Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d11; --card:#13171e; --card-hi:#171c25;
    --line:rgba(255,255,255,0.07); --line-hi:rgba(120,255,190,0.28);
    --txt:#e7ecf2; --txt-dim:#7b8694; --txt-faint:#566070;
    --accent:#46e0a0; --accent-soft:rgba(70,224,160,0.12);
    --red:#ff5d6c; --amber:#ffc24b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; position:relative; overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(70,224,160,0.10), transparent 60%),
      radial-gradient(700px 600px at 90% 110%, rgba(70,160,224,0.06), transparent 55%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
            mask-image:radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
  }
  .panel{position:relative;z-index:1;width:100%;max-width:560px;}
  .top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .logo{font-family:'Sora',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;color:var(--txt);}
  .logo b{color:var(--accent);}
  .tag{font-size:10px;letter-spacing:0.22em;color:var(--txt-faint);text-transform:uppercase;}
  .sub{font-size:11px;color:var(--txt-dim);margin-bottom:20px;letter-spacing:0.02em;}
  #list{display:flex;flex-direction:column;gap:12px;}
  .machine{
    background:linear-gradient(180deg,var(--card-hi),var(--card));
    border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px;
    transition:border-color .25s;animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .machine:hover{border-color:var(--line-hi);}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
  .m-name{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;color:var(--txt);display:flex;align-items:center;gap:8px;}
  .m-name .ico{width:7px;height:7px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .pill{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);color:var(--txt-dim);}
  .pill .d{width:6px;height:6px;border-radius:50%;background:var(--txt-faint);}
  .pill.live{color:var(--accent);border-color:rgba(70,224,160,0.4);background:var(--accent-soft);}
  .pill.live .d{background:var(--accent);box-shadow:0 0 7px var(--accent);animation:bp 1.6s ease-in-out infinite;}
  .pill.dead{color:var(--red);border-color:rgba(255,93,108,0.35);}
  .pill.dead .d{background:var(--red);}
  .pill.checking .d{background:var(--amber);animation:bp 1s ease-in-out infinite;}
  @keyframes bp{0%,100%{opacity:1;}50%{opacity:.3;}}
  .m-url{background:rgba(0,0,0,0.34);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:13.5px;color:var(--accent);word-break:break-all;line-height:1.45;user-select:all;margin-bottom:11px;}
  .m-meta{display:flex;align-items:center;justify-content:space-between;}
  .m-when{font-size:10.5px;color:var(--txt-faint);letter-spacing:0.03em;}
  .m-btns{display:flex;gap:8px;}
  .b{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--txt-dim);border-radius:7px;padding:7px 11px;transition:all .16s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .b:hover{border-color:var(--line-hi);color:var(--txt);background:rgba(255,255,255,0.03);}
  .b.primary{color:var(--accent);border-color:rgba(70,224,160,0.3);}
  .b.primary:hover{background:var(--accent-soft);}
  .b.copied{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
  .empty{border:1px dashed var(--line);border-radius:12px;padding:26px 18px;text-align:center;color:var(--txt-dim);font-size:12.5px;line-height:1.7;}
  .empty .big{color:var(--txt);font-family:'Sora',sans-serif;font-weight:600;font-size:14px;margin-bottom:6px;display:block;}
  .foot{margin-top:18px;text-align:center;font-size:10px;color:var(--txt-faint);letter-spacing:0.1em;}
  .foot .dot{color:var(--accent);}
</style>
</head>
<body>
<div class="panel">
  <div class="top">
    <div class="logo">Coin<b>Shot</b></div>
    <div class="tag">data links</div>
  </div>
  <div class="sub">远程数据机的实时公网地址 · 自动刷新</div>
  <div id="list"><div class="empty"><span class="big">连接中…</span>正在读取 url.json</div></div>
  <div class="foot">auto-refresh 60s <span class="dot">&#9679;</span> live-check 15s</div>
</div>

<script>
/* 仓库定位：优先从本页 GitHub Pages 网址自动推导，失败用备用值 */
let GH_USER = "Eriackk";
let GH_REPO = "Cloudflare_URL";
const GH_BRANCH = "main";
(function(){
  const m = location.hostname.match(/^([^.]+)\.github\.io$/i);
  const seg = location.pathname.split('/').filter(Boolean);
  if(m && seg.length >= 1){ GH_USER = m[1]; GH_REPO = seg[0]; }
})();
const API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/url.json?ref=${GH_BRANCH}`;
const RAW_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/url.json`;

const listEl = document.getElementById('list');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtAgo(iso){
  if(!iso) return "—";
  const t = new Date(iso).getTime();
  if(isNaN(t)) return "—";
  let s = Math.floor((Date.now()-t)/1000); if(s<0) s=0;
  if(s<60) return s+"s ago";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

function parseMachines(obj){
  if(!obj || typeof obj!=="object") return [];
  if(typeof obj.url === "string"){
    return [{name:"data-machine", url:String(obj.url).replace(/\/$/,""), updated_at:obj.updated_at}];
  }
  return Object.entries(obj)
    .filter(([k,v]) => v && typeof v==="object" && v.url)
    .map(([k,v]) => ({name:k, url:String(v.url).replace(/\/$/,""), updated_at:v.updated_at}))
    .sort((a,b)=>a.name.localeCompare(b.name));
}

let lastSig = "";
async function fetchUrls(){
  let obj=null, err="";
  try{
    const r = await fetch(API_URL, {headers:{"Accept":"application/vnd.github.raw+json"}, cache:"no-store"});
    if(r.ok) obj = await r.json(); else err = "API HTTP "+r.status;
  }catch(e){ err = "API "+e.message; }
  if(!obj){
    try{
      const r2 = await fetch(RAW_URL+"?t="+Date.now(), {cache:"no-store"});
      if(r2.ok){ obj = await r2.json(); err=""; } else err += " · raw HTTP "+r2.status;
    }catch(e){ err += " · raw "+e.message; }
  }
  if(!obj){
    listEl.innerHTML = '<div class="empty"><span class="big">读不到 url.json</span>'+esc(err)+'<br>检查仓库名 / 分支 / 数据机是否在发布</div>';
    return;
  }
  const machines = parseMachines(obj);
  if(machines.length===0){
    listEl.innerHTML = '<div class="empty"><span class="big">还没有数据机发布</span>在数据机上运行 main.py（选数据机 T）即可</div>';
    return;
  }
  const sig = machines.map(m=>m.name+"|"+m.url+"|"+m.updated_at).join(",");
  if(sig !== lastSig){ lastSig = sig; renderMachines(machines); }
}

function renderMachines(machines){
  listEl.innerHTML = "";
  machines.forEach((m, i)=>{
    const el = document.createElement("div");
    el.className = "machine"; el.style.animationDelay = (i*0.06)+"s";
    el.innerHTML =
      '<div class="m-top"><div class="m-name"><span class="ico"></span>'+esc(m.name)+'</div>'
      + '<div class="pill checking"><span class="d"></span><span class="t">checking</span></div></div>'
      + '<div class="m-url">'+esc(m.url)+'</div>'
      + '<div class="m-meta"><span class="m-when">published '+fmtAgo(m.updated_at)+'</span>'
      + '<div class="m-btns">'
      + '<a class="b" href="'+esc(m.url)+'/status" target="_blank" rel="noopener">&#8599; /status</a>'
      + '<button class="b primary">&#10697; copy</button></div></div>';
    el.querySelector("button").addEventListener("click", ()=>{
      navigator.clipboard.writeText(m.url).then(()=>{
        const b=el.querySelector("button"); b.classList.add("copied"); b.textContent="\u2713 copied";
        setTimeout(()=>{ b.classList.remove("copied"); b.innerHTML="&#10697; copy"; },1400);
      }).catch(()=>{});
    });
    listEl.appendChild(el);
    checkMachine(m.url, el.querySelector(".pill"));
  });
}

async function checkMachine(url, pill){
  setPill(pill, "checking", "checking");
  try{
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 8000);
    const r = await fetch(url+"/status", {signal:ctrl.signal, cache:"no-store"});
    clearTimeout(to);
    if(r.ok){
      const j = await r.json();
      if(j && typeof j==="object" && ("ws_connected" in j)){
        const total = (j.total||0).toLocaleString();
        setPill(pill, "live", "live \u00b7 "+total+" rec");
      }else setPill(pill, "dead", "bad response");
    }else setPill(pill, "dead", "HTTP "+r.status);
  }catch(e){ setPill(pill, "dead", "offline"); }
}
function setPill(pill, state, text){ pill.className="pill "+state; pill.querySelector(".t").textContent=text; }
function reCheckAll(){
  document.querySelectorAll(".machine").forEach(el=>{
    const url = el.querySelector(".m-url").textContent.trim();
    checkMachine(url, el.querySelector(".pill"));
  });
}
fetchUrls();
setInterval(fetchUrls, 60000);
setInterval(reCheckAll, 15000);
</script>
</body>
</html>
