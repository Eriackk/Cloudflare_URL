<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinShot · Data Links</title>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070a; --green:#9be34a; --green-bright:#c6ff6a; --green-dim:#3f5a2a;
  --panel:rgba(8,18,9,0.82); --border:rgba(120,200,80,0.22); --border-hi:rgba(150,230,90,0.6);
  --txt:#bfe39a; --dim:#5f7a48; --faint:#3c4f2c; --red:#ff6b6b; --amber:#ffc24b;
}
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--txt);}

#matrix{position:fixed;inset:0;z-index:0;}

/* 标题 */
#header-wrap{
  position:fixed;top:28px;left:50%;
  z-index:10;pointer-events:none;
  transform:translateX(-50%);
}
#header{
  text-align:center;
  transform-style:preserve-3d;
  will-change:transform;
}
.title{
  font-family:'Major Mono Display',monospace;
  font-size:clamp(24px,4vw,42px);
  color:var(--green-bright);
  letter-spacing:0.08em;
  text-shadow:0 0 30px rgba(198,255,106,0.7), 0 0 60px rgba(155,227,74,0.3);
}
.subtitle{margin-top:6px;font-size:10px;letter-spacing:0.45em;text-transform:uppercase;color:var(--dim);}
.subtitle b{color:var(--green);}

/* 右下角 Gist ID */
#gist-label{
  position:fixed;bottom:14px;right:18px;
  font-size:9px;letter-spacing:0.15em;color:var(--faint);
  z-index:10;pointer-events:none;user-select:none;
}

/* ── 浮动卡片 ── */
.card{
  position:fixed;
  width:520px;
  border-radius:8px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.7), inset 0 0 40px rgba(120,200,80,0.04);
  z-index:5;
  transition:border-color .2s, box-shadow .2s;
  overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.7;
}
.card.focused{
  border-color:var(--border-hi);
  box-shadow:0 24px 70px rgba(0,0,0,0.8), 0 0 30px rgba(155,227,74,0.18);
  z-index:6;
}
.card.minimized .card-body{display:none;}

/* 标题栏（拖拽手柄） */
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px 9px;cursor:grab;gap:8px;
  border-bottom:1px solid var(--border);
}
.card-header:active{cursor:grabbing;}
.card.minimized .card-header{border-bottom:none;}

.c-name{
  font-family:'Major Mono Display',monospace;
  font-size:13px;color:var(--green-bright);
  letter-spacing:0.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.card-btns{display:flex;gap:5px;flex-shrink:0;}
.cbtn{
  width:18px;height:18px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--dim);font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
.cbtn:hover{border-color:var(--border-hi);color:var(--green-bright);}

/* 状态行 */
.statusrow{
  display:flex;align-items:center;gap:7px;
  font-size:10px;letter-spacing:0.1em;
  padding:8px 13px 0;
}
.d{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0;}
.statusrow.live{color:var(--green-bright);}
.statusrow.live .d{background:var(--green-bright);box-shadow:0 0 8px var(--green-bright);animation:bp 1.5s infinite;}
.statusrow.dead{color:var(--red);} .statusrow.dead .d{background:var(--red);}
.statusrow.checking{color:var(--amber);} .statusrow.checking .d{background:var(--amber);animation:bp 1s infinite;}
@keyframes bp{0%,100%{opacity:1;}50%{opacity:.3;}}

.card-body{padding:10px 13px 13px;}

.label{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;color:var(--faint);margin:8px 0 5px;}
.c-url{
  background:rgba(0,0,0,0.45);border:1px solid var(--border);border-radius:4px;
  padding:9px 10px;font-size:11px;color:var(--green-bright);
  word-break:break-all;line-height:1.4;
  text-shadow:0 0 8px rgba(155,227,74,0.2);
  cursor:text;user-select:text;
  min-height:36px;display:flex;align-items:center;
}
.c-url.none{color:var(--dim);font-size:10px;text-shadow:none;}

.c-bot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px;}
.c-when{font-size:9px;color:var(--faint);white-space:nowrap;}
.btns{display:flex;gap:6px;}
.btn{
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);
  border-radius:5px;padding:5px 9px;transition:all .15s;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;
}
.btn:hover{border-color:var(--border-hi);color:var(--green-bright);}
.btn.primary{color:var(--green);border-color:rgba(150,230,90,0.3);}
.btn.primary:hover{background:rgba(150,230,90,0.08);}
.btn.copied{color:var(--green-bright);border-color:var(--green-bright);}

/* 空状态 */
#empty{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:4;text-align:center;
  border:1px dashed var(--border);border-radius:8px;
  padding:48px 36px;background:var(--panel);backdrop-filter:blur(6px);
  display:none;
}
#empty .big{
  display:block;font-family:'Major Mono Display',monospace;
  font-size:20px;color:var(--green-bright);margin-bottom:10px;
  letter-spacing:0.04em;text-shadow:0 0 18px rgba(155,227,74,0.4);
}
#empty p{font-size:12px;color:var(--dim);line-height:1.8;}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div id="header-wrap">
  <div id="header">
    <div class="title">CoinShot</div>
    <div class="subtitle">machine <b>links</b></div>
  </div>
</div>

<div id="empty">
  <span class="big">STANDBY</span>
  <p>还没有机器登记<br>启动 main.py 即可</p>
</div>

<div id="gist-label">GIST · 666a140edb01cd95544c6da155f0af50</div>

<script>
const GIST_ID = "666a140edb01cd95544c6da155f0af50";
const STORAGE_KEY = "coinshot_cards_v1";

/* ── 矩阵雨（更亮） ── */
(function(){
  const c=document.getElementById("matrix"), x=c.getContext("2d");
  const glyphs="01ｱｲｳｴｵｶｷｸｹｺ$￥#%&XSHOTCN<>=*+".split("");
  let cols,drops,fs=14,W,H;
  function resize(){
    W=c.width=innerWidth;H=c.height=innerHeight;
    cols=Math.floor(W/fs);drops=Array(cols).fill(0).map(()=>Math.random()*-60);
  }
  resize();addEventListener("resize",resize);
  function draw(){
    x.fillStyle="rgba(4,7,10,0.055)";x.fillRect(0,0,W,H);
    x.font=fs+"px monospace";
    for(let i=0;i<cols;i++){
      const ch=glyphs[Math.floor(Math.random()*glyphs.length)];
      const y=drops[i]*fs;
      const r=Math.random();
      if(r<0.03) x.fillStyle="rgba(220,255,120,1)";
      else if(r<0.15) x.fillStyle="rgba(155,227,74,0.85)";
      else x.fillStyle="rgba(100,180,55,0.55)";
      x.fillText(ch,i*fs,y);
      if(y>H&&Math.random()>0.97) drops[i]=0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── 本地存储：位置/大小/最小化状态 ── */
function loadLayout(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }
  catch(e){ return {}; }
}
function saveLayout(layout){ localStorage.setItem(STORAGE_KEY,JSON.stringify(layout)); }

/* ── 全局状态 ── */
const cards = {};   // name → { el, layout:{x,y,minimized} }
let layout = loadLayout();
let topZ = 10;

/* ── 工具 ── */
const esc = s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtAgo(iso){
  if(!iso) return "—";
  const t=new Date(iso).getTime(); if(isNaN(t)) return "—";
  let s=Math.floor((Date.now()-t)/1000); if(s<0)s=0;
  if(s<60) return s+"s ago";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

/* ── 初始随机位置（屏幕中央附近随机偏移） ── */
function randomPos(index){
  const cx = innerWidth/2, cy = innerHeight/2;
  const angle = (index * 137.5) * Math.PI/180;   // 黄金角分布，避免重叠
  const r = 80 + index * 40;
  return {
    x: Math.min(Math.max(cx + Math.cos(angle)*r - 150, 20), innerWidth-320),
    y: Math.min(Math.max(cy + Math.sin(angle)*r - 80,  80), innerHeight-200),
    minimized: false
  };
}

/* ── 创建卡片 ── */
function createCard(machine, index){
  const {name, url, updated_at} = machine;
  const savedLayout = layout[name] || randomPos(index);

  const el = document.createElement("div");
  el.className = "card";
  el.style.left = savedLayout.x + "px";
  el.style.top  = savedLayout.y + "px";
  if(savedLayout.minimized) el.classList.add("minimized");

  el.innerHTML = `
    <div class="card-header">
      <span class="c-name">${esc(name)}</span>
      <div class="card-btns">
        <button class="cbtn min-btn" title="最小化">─</button>
        <button class="cbtn max-btn" title="还原" style="display:none">□</button>
      </div>
    </div>
    <div class="statusrow checking"><span class="d"></span><span class="t">checking…</span></div>
    <div class="card-body">
      <div class="label">tunnel url</div>
      <div class="c-url ${url?'':'none'}">${url ? esc(url) : 'URL 未就绪'}</div>
      <div class="c-bot">
        <span class="c-when">published ${fmtAgo(updated_at)}</span>
        <div class="btns">
          ${url ? `<a class="btn" href="${esc(url)}/status" target="_blank">↗ status</a>
                   <button class="btn primary copy-btn">⊕ copy</button>` : ''}
        </div>
      </div>
    </div>`;

  document.body.appendChild(el);

  // 聚焦到最前
  function bringToFront(){
    el.style.zIndex = ++topZ;
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("focused"));
    el.classList.add("focused");
  }
  el.addEventListener("mousedown", bringToFront);
  bringToFront();

  // 最小化 / 还原
  const minBtn = el.querySelector(".min-btn");
  const maxBtn = el.querySelector(".max-btn");
  minBtn.addEventListener("click", e=>{
    e.stopPropagation();
    el.classList.add("minimized");
    minBtn.style.display="none"; maxBtn.style.display="flex";
    saveCardLayout(name, el);
  });
  maxBtn.addEventListener("click", e=>{
    e.stopPropagation();
    el.classList.remove("minimized");
    maxBtn.style.display="none"; minBtn.style.display="flex";
    saveCardLayout(name, el);
  });

  // 复制按钮
  el.querySelector(".copy-btn")?.addEventListener("click", e=>{
    e.stopPropagation();
    navigator.clipboard.writeText(url).then(()=>{
      const b=el.querySelector(".copy-btn");
      b.classList.add("copied"); b.innerHTML="✓ copied";
      setTimeout(()=>{ b.classList.remove("copied"); b.innerHTML="⊕ copy"; },1400);
    }).catch(()=>{});
  });

  // 拖拽
  makeDraggable(el, el.querySelector(".card-header"), name);

  // 3D 鼠标效果
  make3D(el);

  cards[name] = { el, url, updated_at };
  saveCardLayout(name, el);

  // 探针
  if(url) checkMachine(url, el.querySelector(".statusrow"));

  return el;
}

/* ── 更新已有卡片数据 ── */
function updateCard(machine){
  const {name, url, updated_at} = machine;
  const card = cards[name];
  if(!card) return;
  const el = card.el;

  // 更新 URL 显示
  const urlEl = el.querySelector(".c-url");
  if(urlEl){
    urlEl.className = "c-url" + (url?'':' none');
    urlEl.textContent = url ? url : 'URL 未就绪';
  }
  // 更新时间
  const whenEl = el.querySelector(".c-when");
  if(whenEl) whenEl.textContent = "published " + fmtAgo(updated_at);

  card.url = url; card.updated_at = updated_at;
  if(url) checkMachine(url, el.querySelector(".statusrow"));
}

/* ── 保存布局 ── */
function saveCardLayout(name, el){
  layout[name] = {
    x: parseInt(el.style.left)||0,
    y: parseInt(el.style.top)||0,
    minimized: el.classList.contains("minimized")
  };
  saveLayout(layout);
}

/* ── 拖拽 ── */
function makeDraggable(el, handle, name){
  let ox,oy,dragging=false;
  handle.addEventListener("mousedown", e=>{
    if(e.target.classList.contains("cbtn")) return;
    dragging=true;
    ox=e.clientX-parseInt(el.style.left||0);
    oy=e.clientY-parseInt(el.style.top||0);
    e.preventDefault();
  });
  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    const x=Math.max(0,Math.min(innerWidth-el.offsetWidth, e.clientX-ox));
    const y=Math.max(0,Math.min(innerHeight-el.offsetHeight, e.clientY-oy));
    el.style.left=x+"px"; el.style.top=y+"px";
  });
  document.addEventListener("mouseup", ()=>{
    if(dragging){ dragging=false; saveCardLayout(name,el); }
  });
}

/* ── 独立3D效果（每张卡片响应鼠标与自身距离） ── */
function make3D(el){
  let tx=0,ty=0,cx=0,cy=0;
  function loop(){
    cx+=(tx-cx)*0.15; cy+=(ty-cy)*0.15;
    el.style.transform=`perspective(500px) rotateY(${cx.toFixed(2)}deg) rotateX(${cy.toFixed(2)}deg)`;
    requestAnimationFrame(loop);
  }
  loop();
  document.addEventListener("mousemove", e=>{
    const rect=el.getBoundingClientRect();
    const ecx=rect.left+rect.width/2, ecy=rect.top+rect.height/2;
    const dx=e.clientX-ecx, dy=e.clientY-ecy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const maxDist=350, strength=22;
    const factor=Math.max(0, 1-dist/maxDist);
    tx = (dx/maxDist)*strength*factor*2;
    ty = -(dy/maxDist)*strength*factor*2;
  },{passive:true});
}

/* ── 探针 ── */
async function checkMachine(url, st){
  setStatus(st,"checking","checking…");
  try{
    const ctrl=new AbortController();
    const to=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(url+"/status",{signal:ctrl.signal,cache:"no-store"});
    clearTimeout(to);
    if(r.ok){
      const j=await r.json();
      if(j&&"ws_connected" in j) setStatus(st,"live","live · "+(j.total||0).toLocaleString()+" rec");
      else setStatus(st,"dead","bad response");
    } else setStatus(st,"dead","HTTP "+r.status);
  }catch(e){ setStatus(st,"dead","offline"); }
}
function setStatus(st,state,text){
  st.className="statusrow "+state;
  st.querySelector(".t").textContent=text;
}

/* ── 数据拉取 ── */
function parseMachines(obj){
  if(!obj||typeof obj!=="object") return [];
  return Object.entries(obj)
    .filter(([k,v])=>v&&typeof v==="object"&&"url" in v)
    .map(([k,v])=>({name:k, url:String(v.url||"").replace(/\/$/,""), updated_at:v.updated_at}))
    .sort((a,b)=>a.name.localeCompare(b.name));
}

async function fetchUrls(){
  let obj=null;
  const t=Date.now();
  try{
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}?_=${t}`,{
      headers:{"Accept":"application/vnd.github+json"},cache:"no-store"
    });
    if(r.ok){
      const j=await r.json();
      const content=j?.files?.["url.json"]?.content;
      if(content) obj=JSON.parse(content);
    }
  }catch(e){}

  if(!obj){
    try{
      const r=await fetch(`https://gist.githubusercontent.com/raw/${GIST_ID}/url.json?t=${t}`,{cache:"no-store"});
      if(r.ok) obj=await r.json();
    }catch(e){}
  }

  if(!obj) return;

  const machines=parseMachines(obj);
  const emptyEl=document.getElementById("empty");

  // 移除消失的机器
  Object.keys(cards).forEach(name=>{
    if(!machines.find(m=>m.name===name)){
      cards[name].el.remove();
      delete cards[name];
      delete layout[name];
      saveLayout(layout);
    }
  });

  // 新增 or 更新
  machines.forEach((m,i)=>{
    if(cards[m.name]) updateCard(m);
    else createCard(m, i);
  });

  emptyEl.style.display = machines.length===0 ? "block" : "none";
}

/* ── 定时重新探针所有在线卡片 ── */
function reCheckAll(){
  Object.values(cards).forEach(({el,url})=>{
    if(url) checkMachine(url, el.querySelector(".statusrow"));
  });
}

fetchUrls();
setInterval(fetchUrls, 90000);
setInterval(reCheckAll, 15000);

/* ── 标题3D效果 ── */
(function(){
  const header=document.getElementById("header");
  let tx=0,ty=0,cx=0,cy=0;
  document.addEventListener("mousemove",e=>{
    tx=(e.clientX-innerWidth/2)/innerWidth*30;
    ty=-(e.clientY-innerHeight/2)/innerHeight*18;
  },{passive:true});
  (function loop(){
    cx+=(tx-cx)*0.07; cy+=(ty-cy)*0.07;
    header.style.transform=`perspective(400px) rotateY(${cx.toFixed(2)}deg) rotateX(${cy.toFixed(2)}deg)`;
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
